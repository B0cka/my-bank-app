apiVersion: apps/v1
kind: Deployment
metadata:
  name: transfer-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transfer-service
  template:
    metadata:
      labels:
        app: transfer-service
    spec:
      containers:
        - name: transfer-service
          image: "{{ .Values.transfer.image.repository }}:{{ .Values.transfer.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9800
          env:
            - name: APP_SECURITY_OAUTH2_ISSUER_URI
              valueFrom: { configMapKeyRef: { name: transfer-config, key: APP_SECURITY_OAUTH2_ISSUER_URI } }
            - name: KEYCLOAK_CLIENT_ID
              valueFrom: { configMapKeyRef: { name: transfer-config, key: KEYCLOAK_CLIENT_ID } }
            - name: ACCOUNT_SERVICE_PATH
              valueFrom: { configMapKeyRef: { name: transfer-config, key: ACCOUNT_SERVICE_PATH } }
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-broker-0.kafka-headless.default.svc.cluster.local:9092"
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: APP_SECURITY_ENABLED
              value: "true"
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: transfer-secret
                  key: KEYCLOAK_CLIENT_SECRET
            - name: LOGSTASH_HOST
              valueFrom:
                configMapKeyRef:
                  name: transfer-config
                  key: LOGSTASH_HOST
            - name: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: transfer-config
                  key: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 9800
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 9800
            initialDelaySeconds: 25