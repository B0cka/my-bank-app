api-gateway-charm:
  apiGateway:
    image:
      repository: my-bank-app-api-gateway
      tag: v7

accounts:
  accounts:
    image:
      repository: my-bank-app-accounts-service
      tag: v9

cash:
  cash:
    image:
      repository: my-bank-app-cash-service
      tag: v9

transfer:
  transfer:
    image:
      repository: my-bank-app-transfer-service
      tag: v9

notifications:
  notifications:
    image:
      repository: my-bank-app-notifications-service
      tag: v13

observability:
  enabled: false
  external:
    zipkin: "http://host.docker.internal:9411/api/v2/spans"
    prometheus: "http://host.docker.internal:9090"
    grafana: "http://host.docker.internal:3000"
    elasticsearch: "http://host.docker.internal:9200"
    kibana: "http://host.docker.internal:5601"
    logstash: "host.docker.internal"
    kafka: "host.docker.internal:9092"
    zookeeper: "host.docker.internal:2181"

prometheus:
  server:
    persistentVolume:
      enabled: false
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
  alertmanager:
    enabled: true
    persistentVolume:
      enabled: false

grafana:
  dashboards:
    default:
      spring-boot:
        gnetId: 10273
        revision: 1

zipkin:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi

elasticsearch:
  replicas: 1
  minimumMasterNodes: 1
  esJavaOpts: "-Xmx512m -Xms512m"
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1
      memory: 2Gi
  persistence:
    enabled: false

kibana:
  env:
    ELASTICSEARCH_HOSTS: "http://elasticsearch-master:9200"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi

logstash:
  logstash:
    pipeline:
      input: |
        beats {
          port => 5044
        }
      filter: |
        grok {
          match => { "message" => "%{COMBINEDAPACHELOG}" }
        }
      output: |
        elasticsearch {
          hosts => ["http://elasticsearch-master:9200"]
          index => "bank-logs-%{+YYYY.MM.dd}"
        }
  service:
    type: ClusterIP
    port: 5044
  resources:
    requests:
      cpu: 250m
      memory: 512Mi

zookeeper:
  replicaCount: 1
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 250m
      memory: 512Mi

kafka:
  replicaCount: 1
  listeners:
    client:
      protocol: PLAINTEXT
  offsetsTopicReplicationFactor: 1
  transactionStateLogReplicationFactor: 1
  transactionStateLogMinIsr: 1
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1
      memory: 2Gi
  zookeeper:
    enabled: false
  externalZookeeper:
    servers: "zookeeper:2181"