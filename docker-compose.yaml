version: '3.8'

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ports: [ "9200:9200" ]
    volumes: [ "es_data:/usr/share/elasticsearch/data" ]

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    ports: [ "5044:5044" ]
    volumes: [ "./logstash/pipeline:/usr/share/logstash/pipeline" ]
    depends_on: [ "elasticsearch" ]

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    ports: [ "5601:5601" ]
    depends_on: [ "elasticsearch" ]

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - bank-network

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - bank-network

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: bank
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bank-network


  accounts-service:
    build: ./accounts-service
    image: my-bank-app-accounts-service:v4
    container_name: accounts-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bank
    ports:
      - "8090:8090"
    depends_on:
      - postgres
      - keycloak
    networks:
      - bank-network

  cash-service:
    build: ./cash-service
    image: my-bank-app-cash-service:v4
    container_name: cash-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8900:8900"
    depends_on:
      - keycloak
      - accounts-service
    networks:
      - bank-network

  transfer-service:
    build: ./transfer-service
    image: my-bank-app-transfer-service:v4
    container_name: transfer-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "9800:9800"
    depends_on:
      - keycloak
      - accounts-service
    networks:
      - bank-network

  notifications-service:
    build: ./notifications-service
    image: my-bank-app-notifications-service:v5
    container_name: notifications-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "9900:9900"
    depends_on:
      - keycloak
    networks:
      - bank-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.3
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8181:8080"
    volumes:
      - ./infra/keycloak/realm-export:/opt/keycloak/data/import
    networks:
      - bank-network

  api-gateway:
    build: ./api-gateway
    image: my-bank-app-api-gateway:v4
    container_name: api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8700:8700"
    depends_on:
      - keycloak
      - accounts-service
      - cash-service
      - transfer-service
    networks:
      - bank-network


  front-ui:
    build: ./front-ui
    image: my-bank-app-front-ui:latest
    container_name: front-ui
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8180:8180"
    depends_on:
      - keycloak
      - api-gateway
    networks:
      - bank-network

networks:
  bank-network:
    driver: bridge

volumes:
  es_data:
  postgres_data:
  zookeeper-data:
  zookeeper-log:
  kafka-data:


