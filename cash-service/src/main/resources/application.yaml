account:
  service:
    path:
      http://accounts-service

spring:
  application:
    name: cash-service
  cloud:
    consul:
      host: localhost
      port: 8500
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8181/realms/bank-realm
      client:
        registration:
          keycloak:
            client-id: cash-id
            client-secret: GbMK0I9cl5t89lod3Xf47ikldUotRspQ
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            issuer-uri: http://localhost:8181/realms/bank-realm
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        spring.json.add.type.headers: true
server:
  port: 8900

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus