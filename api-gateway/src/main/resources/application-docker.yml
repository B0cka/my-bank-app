server:
  port: 8700

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: accounts-service-route
          uri: lb://accounts-service
          predicates:
            - Path=/accounts/**
        - id: cash-service-route
          uri: lb://cash-service
          predicates:
            - Path=/cash/**
        - id: transfer-service-route
          uri: lb://transfer-service
          predicates:
            - Path=/transfer/**
        - id: notifications-service-route
          uri: lb://notifications-service
          predicates:
            - Path=/notifications/**

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${APP_SECURITY_OAUTH2_ISSUER_URI}

management:
  endpoints:
    web:
      exposure:
        include: health,info