server:
  port: 8090

spring:
  application:
    name: accounts-service

  cloud:
    consul:
      host: consul
      port: 8500

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/bank-realm

  datasource:
    url: jdbc:postgresql://postgres:5432/bank?ssl=false&sslmode=disable
    username: bank
    password: bank
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

management:
  endpoints:
    web:
      exposure:
        include: health,info