spring:
  application:
    name: transfer-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${APP_SECURITY_OAUTH2_ISSUER_URI}
      client:
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID}
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            issuer-uri: ${APP_SECURITY_OAUTH2_ISSUER_URI}

account:
  service:
    path: ${ACCOUNT_SERVICE_PATH}

notification:
  service:
    path: ${NOTIFICATION_SERVICE_PATH}

server:
  port: 9800

management:
  security:
    enabled: false
  endpoints:
    web:
      exposure:
        include: health,info
