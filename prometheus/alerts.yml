groups:
  - name: bank-business-alerts
    rules:
      - alert: HighWithdrawalFailures
        expr: rate(bank_withdrawal_failed_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          service: accounts
        annotations:
          summary: "Много неуспешных снятий"
          description: "Пользователь {{ $labels.login }} не может снять деньги. Ошибок: {{ $value }} в секунду"

      - alert: HighTransferFailures
        expr: rate(bank_transfer_failed_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          service: transfer
        annotations:
          summary: "Проблемы с переводами"
          description: "Перевод от {{ $labels.from }} к {{ $labels.to }} не проходит. Ошибок: {{ $value }} в секунду"

      - alert: HighNotificationFailures
        expr: rate(bank_notification_failed_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          service: notifications
        annotations:
          summary: "Сервис уведомлений не работает"
          description: "Не удаётся отправить уведомление пользователю {{ $labels.login }}. Ошибок: {{ $value }} в секунду"

      - alert: HighHttpErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (application)
          /
          sum(rate(http_server_requests_seconds_count[5m])) by (application)
          > 0.05
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Высокий уровень ошибок на {{ $labels.application }}"
          description: "{{ $value | humanizePercentage }} запросов завершаются с ошибкой 5xx"

      - alert: SlowResponses
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Медленные ответы на {{ $labels.application }}"
          description: "95% запросов выполняются дольше 2 секунд (текущий p95: {{ $value }}s)"